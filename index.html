<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cátedra de Toxicología - Menú Institucional</title>

  <link rel="icon" href="logo2.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Tonalidades mejoradas: más profundas y armónicas */
      --primary: #0e8391;
      --primary-dark: #075f69;
      --accent: #15aabf;
      --bg-gradient: linear-gradient(135deg, #064e57 0%, #0c8c9c 50%, #055e69 100%);
      --glass-bg: rgba(255, 255, 255, 0.92);
      --shadow-soft: 0 15px 35px rgba(0,0,0,0.2);
    }

    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-gradient);
      background-attachment: fixed;
    }

    .fecha {
      align-self: flex-end;
      margin: 25px 35px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    main {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.4); /* Brillo en el borde */
      border-radius: 24px;
      width: 90%;
      max-width: 400px;
      padding: 35px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      margin-top: auto;
      margin-bottom: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease;
    }

    .logo {
      width: 100%;
      height: auto;
      margin-bottom: 30px;
      display: block;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* BOTONES PRINCIPALES */
    .btn {
      display: block;
      box-sizing: border-box;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(to right, var(--primary), var(--accent));
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
      text-align: center;
      box-shadow: 0 4px 12px rgba(12, 140, 156, 0.3);
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 20px rgba(12, 140, 156, 0.4);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    /* SUBBOTONES */
    .subbtn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-dark);
      background-color: #e6eef0;
      border: 1.5px solid rgba(12, 140, 156, 0.2);
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      text-decoration: none;
    }

    .subbtn:hover {
      background-color: var(--primary-dark);
      color: #fff;
      border-color: var(--primary-dark);
    }

    .collapsible {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-in-out;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .visible {
      max-height: 500px;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .datos {
      margin-top: 15px;
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      display: none;
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.7);
      border-radius: 12px;
      border: 1px dashed var(--primary);
    }

    .datos p { margin: 8px 0; }
    .datos strong { color: var(--primary-dark); }

    footer {
      width: 100%;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      font-weight: 500;
      padding: 20px 0;
      letter-spacing: 0.3px;
    }

    @media screen and (max-width: 480px) {
      main { padding: 25px; }
      .titulo-centro { font-size: 1.5em; }
    }
  </style>
</head>
<body>
  <div class="fecha" id="fecha"></div>

  <main>
    <img src="logo.png" alt="Logo" class="logo">

    <a class="btn" href="https://notas-toxicologia-unlp.netlify.app/">Asistencia y Calificaciones</a>
    <a class="btn" href="https://inscripcion-hosic-toxicologia.netlify.app/">Inscripciones</a>
    <button class="btn" onclick="toggleContacto()">Canales de Contacto</button>

    <div id="contactoBox" class="collapsible">
      <a class="subbtn" target="_blank" href="https://cartelera.med.unlp.edu.ar/catedra/10">Cartelera Virtual</a>
      <a class="subbtn" target="_blank" href="https://educativa.med.unlp.edu.ar/login/index.php">Entorno Educativo</a>
      <button class="subbtn" onclick="toggleDatos()">Información de la Cátedra</button>

      <div id="datosCatedra" class="datos">
        <p><strong>Dirección:</strong><br>
        Anexo Calle 7 Nº1523 – FCM – UNLP</p>
        <p><strong>Email:</strong><br>
        toxicologia@med.unlp.edu.ar<br>
        toxicoalumnos@gmail.com</p>
      </div>
    </div>
  </main>

  <footer>
    © 2026 Cátedra de Toxicología<br>
    Facultad de Ciencias Médicas - UNLP
  </footer>

  <script>
    // Fecha dinámica
    const fechaDiv = document.getElementById('fecha');
    const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
    fechaDiv.textContent = new Date().toLocaleDateString('es-AR', opcionesFecha);

    // Funciones colapsables
    const contactoBox = document.getElementById('contactoBox');
    const datosCatedra = document.getElementById('datosCatedra');

    function toggleContacto() {
      const isOpen = contactoBox.classList.contains('visible');
      if (isOpen) {
        closeAll();
      } else {
        contactoBox.classList.add('visible');
      }
    }

    function toggleDatos() {
      datosCatedra.style.display = datosCatedra.style.display === 'block' ? 'none' : 'block';
    }

    function closeAll() {
      contactoBox.classList.remove('visible');
      datosCatedra.style.display = 'none';
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") closeAll(); });
  </script>
</body>
</html>
