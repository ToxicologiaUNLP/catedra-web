<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cátedra de Toxicología - Menú Institucional</title>

  <link rel="icon" href="logo2.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0e8391;
      --primary-dark: #075f69;
      --accent: #15aabf;
      --bg-gradient: linear-gradient(135deg, #064e57 0%, #0c8c9c 50%, #055e69 100%);
      --glass-bg: rgba(255, 255, 255, 0.94);
    }

    body, html {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      background: var(--bg-gradient); background-attachment: fixed;
    }

    .fecha {
      align-self: flex-end;
      margin: 25px 35px 0 0;
      font-size: 13px; color: rgba(255,255,255,0.7);
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    }

    main {
      background: var(--glass-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 24px;
      width: 90%; max-width: 400px;
      padding: 35px; text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      margin-top: auto; margin-bottom: auto;
      display: flex; flex-direction: column; align-items: center;
      z-index: 1;
    }

    .logo {
      width: 100%; height: auto;
      margin-bottom: 30px; display: block;
      border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      display: block; width: 100%;
      box-sizing: border-box;
      padding: 16px; margin: 12px 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px; font-weight: 700;
      color: #fff;
      background: linear-gradient(to right, var(--primary), var(--accent));
      border: none; border-radius: 14px;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none; text-align: center;
      box-shadow: 0 4px 12px rgba(12, 140, 156, 0.3);
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 20px rgba(12, 140, 156, 0.4);
      filter: brightness(1.1);
    }

    .collapsible {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-in-out;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 0 2px;
      box-sizing: border-box;
    }

    .visible {
      max-height: 600px;
      margin-top: 10px; margin-bottom: 10px;
    }

    .subbtn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      margin: 6px 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--primary-dark);
      background-color: #eef4f5;
      border: 2px solid rgba(12, 131, 145, 0.3);
      border-radius: 12px;
      cursor: pointer; text-decoration: none; text-align: center;
      transition: all 0.25s ease;
    }

    .subbtn:hover {
      background-color: var(--primary-dark);
      color: #fff;
      border-color: var(--primary-dark);
      transform: translateX(4px);
    }

    /* MODAL MEJORADO */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(4, 84, 93, 0.96);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center; align-items: center;
      z-index: 9999; padding: 20px;
    }

    .modal {
      background: white; padding: 35px;
      border-radius: 28px; max-width: 380px;
      width: 100%; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .modal-emoji { font-size: 55px; display: block; margin-bottom: 15px; }
    .modal h2 { color: var(--primary-dark); margin: 10px 0; font-family: 'Montserrat'; font-weight: 700; }
    .modal p { color: #444; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
    
    .btn-modal-action {
      background: var(--primary); color: white;
      border: none; padding: 15px;
      border-radius: 12px; font-weight: 700; font-size: 16px;
      cursor: pointer; width: 100%; text-decoration: none; display: block;
      transition: 0.3s;
    }

    .btn-modal-action:hover { background: var(--primary-dark); }

    .btn-modal-back {
      background: transparent; color: var(--primary);
      border: 2px solid var(--primary); padding: 12px;
      border-radius: 12px; font-weight: 700;
      cursor: pointer; margin-top: 12px; width: 100%;
    }

    .datos {
      margin-top: 15px; font-size: 14px; color: #444; line-height: 1.6;
      display: none; text-align: center; padding: 15px;
      background: rgba(255,255,255,0.7); border-radius: 12px;
      border: 1px dashed var(--primary);
      width: 100%; box-sizing: border-box;
    }

    footer {
      width: 100%; font-size: 12px; color: rgba(255,255,255,0.6);
      text-align: center; font-weight: 500; padding: 20px 0;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="modal" id="modalContenido">
      </div>
  </div>

  <div class="fecha" id="fecha"></div>

  <main>
    <img src="logo.png" alt="Logo" class="logo">

    <a class="btn" href="https://notas-toxicologia-unlp.netlify.app/">Asistencia y Calificaciones</a>
    
    <button class="btn" onclick="toggleInscripciones()">Inscripciones</button>
    <div id="inscripcionesBox" class="collapsible">
      <button class="subbtn" onclick="validarAccesoCursada()">Comisión de Cursada</button>
      <a class="subbtn" target="_blank" href="https://inscripcion-hosic-toxicologia.netlify.app/">Taller de Simulación (HoSiC)</a>
    </div>

    <button class="btn" onclick="toggleContacto()">Canales de Contacto</button>
    <div id="contactoBox" class="collapsible">
      <a class="subbtn" target="_blank" href="https://cartelera.med.unlp.edu.ar/catedra/10">Cartelera Virtual</a>
      <a class="subbtn" target="_blank" href="https://educativa.med.unlp.edu.ar/login/index.php">Entorno Educativo</a>
      <button class="subbtn" onclick="toggleDatos()">Información de la Cátedra</button>

      <div id="datosCatedra" class="datos">
        <p><strong>Dirección:</strong><br>
        Anexo Calle 7 Nº1523 – FCM – UNLP</p>
        <p><strong>Email:</strong><br>
        Administrativas: toxicologia@med.unlp.edu.ar<br>
        Pedagógicas: toxicoalumnos@gmail.com</p>
      </div>
    </div>
  </main>

  <footer>
    © 2026 Cátedra de Toxicología<br>
    Facultad de Ciencias Médicas - UNLP
  </footer>

  <script>
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQl056VY6Tv-hIeNjQrcElL4zusVkjizmfO8YJLqe6IhGwk4eYY3D1SeqpUFIP9RnESYuNGsc_sn7J3/pub?gid=0&single=true&output=csv";
    const formsURL = "https://forms.gle/nCxqNzoqHYv2rmHi6";

    function parsearFechaZero(str) {
      const parts = str.trim().split('/');
      return new Date(2000 + parseInt(parts[2]), parts[1] - 1, parts[0], 0, 0, 0);
    }

    function validarAccesoCursada() {
      const overlay = document.getElementById('overlay');
      const modal = document.getElementById('modalContenido');
      modal.innerHTML = `<span class="modal-emoji">⚙️</span><h2>Verificando...</h2><p>Consultando el estado de inscripción.</p>`;
      overlay.style.display = 'flex';

      fetch(csvURL).then(res => res.text()).then(csv => {
        const filas = csv.trim().split("\n").map(f => f.split(","));
        const randoFechas = filas[0][6]; // Celda G1
        const [inicioStr, finStr] = randoFechas.split('-');
        
        const fInicio = parsearFechaZero(inicioStr);
        const fFin = parsearFechaZero(finStr);
        const hoy = new Date();

        if (hoy < fInicio) {
          modal.innerHTML = `<span class="modal-emoji">⏳</span><h2>PRÓXIMAMENTE</h2><p>La inscripción abrirá el día:<br><strong>${inicioStr} - 00:00 hs</strong></p><button class="btn-modal-back" onclick="cerrarModal()">Cerrar</button>`;
        } else if (hoy >= fFin) {
          modal.innerHTML = `<span class="modal-emoji">🏁</span><h2>ETAPA FINALIZADA</h2><p>El período de inscripción cerró el día:<br><strong>${finStr} - 00:00 hs</strong></p><button class="btn-modal-back" onclick="cerrarModal()">Volver</button>`;
        } else {
          modal.innerHTML = `<span class="modal-emoji">📋</span><h2>SISTEMA ABIERTO</h2><p>Ya puedes completar tu inscripción a la comisión de cursada.</p><a class="btn-modal-action" href="${formsURL}" target="_blank" onclick="cerrarModal()">Ir al Formulario</a><button class="btn-modal-back" onclick="cerrarModal()">Cancelar</button>`;
        }
      }).catch(() => {
        modal.innerHTML = `<h2>Error</h2><p>No se pudo conectar con el servidor.</p><button class="btn-modal-back" onclick="cerrarModal()">Cerrar</button>`;
      });
    }

    function cerrarModal() { document.getElementById('overlay').style.display = 'none'; }

    // --- Interfaz ---
    const fechaDiv = document.getElementById('fecha');
    const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
    fechaDiv.textContent = new Date().toLocaleDateString('es-AR', opcionesFecha);

    const contactoBox = document.getElementById('contactoBox');
    const inscripcionesBox = document.getElementById('inscripcionesBox');
    const datosCatedra = document.getElementById('datosCatedra');

    function toggleInscripciones() {
      const isOpen = inscripcionesBox.classList.contains('visible');
      closeAll();
      if (!isOpen) inscripcionesBox.classList.add('visible');
    }

    function toggleContacto() {
      const isOpen = contactoBox.classList.contains('visible');
      closeAll();
      if (!isOpen) contactoBox.classList.add('visible');
    }

    function toggleDatos() {
      datosCatedra.style.display = datosCatedra.style.display === 'block' ? 'none' : 'block';
    }

    function closeAll() {
      contactoBox.classList.remove('visible');
      inscripcionesBox.classList.remove('visible');
      datosCatedra.style.display = 'none';
    }
  </script>
</body>
</html>
